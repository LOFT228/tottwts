services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: adrena
      CORS_ORIGINS: http://localhost:3000
      # Optional:
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # OPENAI_MODEL: gpt-4o-mini
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
